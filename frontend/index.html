<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Telegram Mini App Test v2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Vercel Web Analytics (works on Vercel after enabling in dashboard) -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <h1>Telegram Mini App Test v2</h1>
    <textarea
      id="user-input"
      class="user-input"
      rows="6"
      placeholder="Describe your subject and scene in any language..."
    ></textarea>
    <p id="hint" class="hint">Minimum 20 characters</p>
    <button id="hello-btn">Generate Prompt</button>
    <div id="output" class="output"></div>
    <button id="copy-btn" class="copy-btn" hidden>Copy Final Prompt</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
